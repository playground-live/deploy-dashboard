# dev環境デプロイの例
# mainブランチへのpushでdev環境にデプロイし、ダッシュボードに通知する
# repositoryId と repository は github コンテキストから自動取得される
name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ============================
      # ここにデプロイ処理を記述
      # ============================

      - name: Report deployment
        uses: myorg/deploy-dashboard/.github/actions/report-deployment@main
        with:
          environment: dev
          service-key: ${{ github.event.repository.name }}
          dashboard-url: ${{ vars.DEPLOY_DASHBOARD_URL }}
          api-key: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
